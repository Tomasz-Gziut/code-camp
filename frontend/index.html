<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firm Safety Checker (Mock)</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040814;
        --bg-deep: #02040b;
        --card: rgba(11, 18, 36, 0.78);
        --muted: #8ea0c5;
        --text: #f5f7ff;
        --border: rgba(170, 194, 255, 0.16);
        --accent: #7dd3fc;
        --accent-2: #c084fc;
        --meter-start: #2d6bff;
        --meter-end: #2af5c8;
        --low: #22c55e;
        --med: #eab308;
        --high: #f97316;
        --vhigh: #ef4444;
        --focus: rgba(125, 211, 252, 0.28);
      }
      * {
        box-sizing: border-box;
      }
      html {
        background: var(--bg-deep);
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "Trebuchet MS", Verdana, sans-serif;
        background: linear-gradient(180deg, #07101f 0%, var(--bg) 38%, var(--bg-deep) 100%);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .appShell {
        position: relative;
        min-height: 100vh;
      }
      .appContent {
        position: relative;
        z-index: 1;
      }
      .starfield {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .starfieldBase {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(1200px 800px at 10% 0%, rgba(118, 84, 255, 0.18), transparent 52%),
          radial-gradient(900px 700px at 90% 12%, rgba(34, 211, 238, 0.12), transparent 48%),
          linear-gradient(180deg, #07101f 0%, var(--bg) 38%, var(--bg-deep) 100%);
      }
      .starGradient {
        position: absolute;
        inset: 0;
      }
      .starGradientA {
        background:
          radial-gradient(44vw 34vw at 18% 12%, rgba(192, 132, 252, 0.16), transparent 60%),
          radial-gradient(56vw 40vw at 62% 24%, rgba(59, 130, 246, 0.08), transparent 68%);
        opacity: 0.9;
      }
      .starGradientB {
        background:
          radial-gradient(40vw 30vw at 82% 16%, rgba(125, 211, 252, 0.12), transparent 58%),
          radial-gradient(46vw 32vw at 38% 10%, rgba(56, 189, 248, 0.05), transparent 70%);
        opacity: 0.75;
      }
      .wrap {
        max-width: 860px;
        padding: 28px 18px 54px;
        margin: 0 auto;
      }
      header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .card {
        background: color-mix(in srgb, var(--card) 100%, transparent);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(14px);
        box-shadow: 0 22px 60px rgba(1, 4, 12, 0.36);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      label {
        font-size: 13px;
        color: var(--muted);
      }
      input[type="search"] {
        width: min(520px, 100%);
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.72);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 12px;
        outline: none;
        font-size: 15px;
      }
      input[type="search"]:focus {
        border-color: color-mix(in oklab, var(--text) 20%, var(--border));
        box-shadow: 0 0 0 4px var(--focus);
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
      }
      .resultsHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .resultsHeader h2 {
        margin: 0;
        font-size: 16px;
      }
      .count {
        color: var(--muted);
        font-size: 13px;
      }
      .list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0;
        margin: 0;
        list-style: none;
      }
      .firmLi {
        list-style: none;
      }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.56);
      }
      .itemLink {
        width: 100%;
        text-align: left;
        cursor: pointer;
        font: inherit;
        color: inherit;
        text-decoration: none;
      }
      .itemLink:hover {
        border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
        background: rgba(16, 24, 46, 0.88);
      }
      .itemLink:focus {
        outline: none;
      }
      .itemLink:focus-visible {
        box-shadow: 0 0 0 4px var(--focus);
      }
      .pageHeader {
        margin-bottom: 18px;
      }
      .backLink {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: color-mix(in srgb, var(--accent) 78%, var(--text));
        text-decoration: none;
        font-size: 14px;
        font-weight: 650;
        width: fit-content;
      }
      .backLink:hover {
        text-decoration: underline;
      }
      .firmTop {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .firmSummary {
        min-width: 0;
      }
      .right {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      .name {
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
      }
      .left {
        flex: 1 1 auto;
        min-width: 0;
      }
      .listMiniChart {
        flex: 0 0 auto;
        width: 90px;
        height: 90px;
        opacity: 0.92;
      }
      .badge {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 650;
        border: 1px solid var(--border);
      }
      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.01em;
        border: 1px solid var(--border);
      }
      .tag.scoreTone {
        color: var(--text);
        padding: 0;
        min-height: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
      }
      .scoreTone {
        color: color-mix(in oklab, var(--score-tone) 92%, var(--text));
        border-color: color-mix(in oklab, var(--score-tone) 44%, var(--border));
        background: color-mix(in oklab, var(--score-tone) 16%, transparent);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .scoreTone .dot {
        background: var(--score-tone);
      }
      .lowRisk {
        color: color-mix(in oklab, var(--low) 92%, var(--text));
        border-color: color-mix(in oklab, var(--low) 40%, var(--border));
        background: color-mix(in oklab, var(--low) 16%, transparent);
      }
      .lowRisk .dot {
        background: var(--low);
      }
      .medRisk {
        color: color-mix(in oklab, var(--med) 92%, var(--text));
        border-color: color-mix(in oklab, var(--med) 44%, var(--border));
        background: color-mix(in oklab, var(--med) 16%, transparent);
      }
      .medRisk .dot {
        background: var(--med);
      }
      .highRisk {
        color: color-mix(in oklab, var(--high) 92%, var(--text));
        border-color: color-mix(in oklab, var(--high) 44%, var(--border));
        background: color-mix(in oklab, var(--high) 16%, transparent);
      }
      .highRisk .dot {
        background: var(--high);
      }
      .vhighRisk {
        color: color-mix(in oklab, var(--vhigh) 92%, var(--text));
        border-color: color-mix(in oklab, var(--vhigh) 44%, var(--border));
        background: color-mix(in oklab, var(--vhigh) 16%, transparent);
      }
      .vhighRisk .dot {
        background: var(--vhigh);
      }
      .score {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .meter {
        position: relative;
        width: 88px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--card) 76%, transparent);
        overflow: hidden;
      }
      .meterFill {
        position: absolute;
        inset: 0;
        display: block;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--meter-start), var(--meter-end));
        box-shadow:
          0 0 14px color-mix(in srgb, var(--meter-start) 32%, transparent),
          0 0 18px color-mix(in srgb, var(--meter-end) 26%, transparent);
        clip-path: inset(0 calc(100% - var(--fill-percent, 0%)) 0 0 round 999px);
      }
      .panel {
        margin-top: 8px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.58);
      }
      .panelTitle {
        font-size: 13px;
        font-weight: 650;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .chartWrap {
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
      }
      .chartDateNav {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) 48px;
        align-items: center;
        gap: 14px;
        max-width: 420px;
        margin: 0 auto 14px;
      }
      .chartNavArrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: color-mix(in oklab, var(--card) 90%, transparent);
        color: var(--text);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, color 0.18s ease;
      }
      .chartNavArrow svg {
        display: block;
      }
      .chartNavArrow:hover:not(:disabled) {
        border-color: color-mix(in oklab, var(--purple) 38%, var(--border));
        background: color-mix(in oklab, var(--purple2) 12%, var(--card));
        transform: translateY(-1px);
      }
      .chartNavArrow:focus-visible,
      .snapshotMiniButton:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px var(--focus);
      }
      .chartNavArrow:disabled {
        opacity: 0.38;
        cursor: default;
      }
      .chartDateLabel {
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text);
      }
      .snapshotGallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0;
        margin-top: 12px;
      }
      .snapshotMiniButton {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 92px;
        height: 92px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        transition: transform 0.18s ease;
      }
      .snapshotMiniButton:hover {
        transform: translateY(-1px);
      }
      .snapshotMini {
        width: 90px;
        height: 90px;
        transform: scale(1);
        transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
        opacity: 0.68;
      }
      .snapshotMiniButton:hover .snapshotMini {
        opacity: 0.9;
      }
      .snapshotMiniButton.active .snapshotMini {
        transform: scale(1.12);
        opacity: 1;
        filter: drop-shadow(0 0 10px color-mix(in oklab, var(--purple2) 44%, transparent));
      }
      .catList {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      @media (max-width: 640px) {
        .item {
          align-items: flex-start;
        }
        .listMiniChart {
          width: 76px;
          height: 76px;
        }
        .chartWrap {
          max-width: none;
        }
        .chartDateNav {
          grid-template-columns: 42px minmax(0, 1fr) 42px;
          gap: 10px;
        }
        .chartNavArrow {
          width: 42px;
          height: 42px;
          border-radius: 14px;
        }
        .chartDateLabel {
          font-size: 12px;
        }
        .snapshotMiniButton {
          width: 76px;
          height: 76px;
        }
        .snapshotMini {
          width: 76px;
          height: 76px;
        }
      }
      .catRow {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.52);
      }
      .catLeft {
        min-width: 0;
      }
      .catRight {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex: 0 0 auto;
      }
      .catName {
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      .catDetail {
        color: var(--muted);
        font-size: 13px;
        margin-top: 8px;
      }
      .catSources {
        margin-top: 10px;
      }
      .catSources summary {
        cursor: pointer;
        color: #b7c7ff;
        font-size: 12px;
        font-weight: 600;
        user-select: none;
      }
      .catSources summary:hover {
        color: #d3deff;
      }
      .catSourcesList {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .catSourceLink {
        color: #eef3ff;
        text-decoration: none;
        font-size: 13px;
        line-height: 1.4;
        word-break: break-word;
      }
      .catSourceLink:hover {
        text-decoration: underline;
      }
      .empty {
        padding: 14px 12px;
        border-radius: 12px;
        border: 1px dashed var(--border);
        color: var(--muted);
        font-size: 14px;
      }
      .footerNote {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }
      mark {
        background: rgba(192, 132, 252, 0.26);
        color: inherit;
        padding: 0 0.1em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

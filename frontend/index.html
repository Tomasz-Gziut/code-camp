<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firm Safety Checker (Mock)</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040814;
        --bg-deep: #02040b;
        --card: rgba(11, 18, 36, 0.78);
        --muted: #8ea0c5;
        --text: #f5f7ff;
        --border: rgba(170, 194, 255, 0.16);
        --accent: #7dd3fc;
        --accent-2: #c084fc;
        --meter-start: #163b6f;
        --meter-end: #27d3b0;
        --low: #22c55e;
        --med: #eab308;
        --high: #f97316;
        --vhigh: #ef4444;
        --focus: rgba(125, 211, 252, 0.28);
      }
      * {
        box-sizing: border-box;
      }
      html {
        background: var(--bg-deep);
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "Trebuchet MS", Verdana, sans-serif;
        background: linear-gradient(180deg, #07101f 0%, var(--bg) 38%, var(--bg-deep) 100%);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .appShell {
        position: relative;
        min-height: 100vh;
      }
      .appContent {
        position: relative;
        z-index: 1;
      }
      .starfield {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .starfieldBase {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(1200px 800px at 10% 0%, rgba(118, 84, 255, 0.18), transparent 52%),
          radial-gradient(900px 700px at 90% 12%, rgba(34, 211, 238, 0.12), transparent 48%),
          linear-gradient(180deg, #07101f 0%, var(--bg) 38%, var(--bg-deep) 100%);
      }
      .starfieldGlow {
        position: absolute;
        border-radius: 999px;
        filter: blur(22px);
        opacity: 0.35;
        animation: galaxyDriftA 34s ease-in-out infinite alternate;
        will-change: transform, opacity;
      }
      .starfieldGlowA {
        top: 8%;
        left: 14%;
        width: 34vw;
        height: 34vw;
        min-width: 260px;
        min-height: 260px;
        background: radial-gradient(circle, rgba(192, 132, 252, 0.26), transparent 68%);
      }
      .starfieldGlowB {
        right: 8%;
        top: 16%;
        width: 28vw;
        height: 28vw;
        min-width: 220px;
        min-height: 220px;
        background: radial-gradient(circle, rgba(125, 211, 252, 0.18), transparent 70%);
        animation: galaxyDriftB 42s ease-in-out infinite alternate;
      }
      .starLayer {
        position: absolute;
        inset: 0;
      }
      .star {
        position: absolute;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.98) 0%, rgba(191, 219, 254, 0.92) 45%, rgba(191, 219, 254, 0) 100%);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.18);
        animation-name: twinkle;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
        transform: translate3d(0, 0, 0);
      }
      .starLayer2 .star {
        background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(196, 181, 253, 0.94) 45%, rgba(196, 181, 253, 0) 100%);
      }
      .starLayer3 .star {
        box-shadow: 0 0 14px rgba(125, 211, 252, 0.28);
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.18;
          transform: translate3d(0, 0, 0) scale(0.9);
        }
        30% {
          opacity: 0.32;
        }
        45% {
          opacity: 1;
          transform: translate3d(var(--drift-x), var(--drift-y), 0) scale(1.35);
        }
        60% {
          opacity: 0.22;
        }
      }
      @keyframes galaxyDriftA {
        0% {
          transform: translate3d(-8vw, -4vh, 0) scale(0.88);
          opacity: 0.18;
        }
        25% {
          transform: translate3d(3vw, 2vh, 0) scale(1);
          opacity: 0.28;
        }
        50% {
          transform: translate3d(10vw, 8vh, 0) scale(1.14);
          opacity: 0.38;
        }
        75% {
          transform: translate3d(-2vw, 14vh, 0) scale(1.04);
          opacity: 0.3;
        }
        100% {
          transform: translate3d(-12vw, 6vh, 0) scale(0.92);
          opacity: 0.2;
        }
      }
      @keyframes galaxyDriftB {
        0% {
          transform: translate3d(10vw, -6vh, 0) scale(0.84);
          opacity: 0.12;
        }
        20% {
          transform: translate3d(2vw, 6vh, 0) scale(0.94);
          opacity: 0.2;
        }
        50% {
          transform: translate3d(-12vw, 16vh, 0) scale(1.18);
          opacity: 0.3;
        }
        80% {
          transform: translate3d(-4vw, 4vh, 0) scale(1.02);
          opacity: 0.22;
        }
        100% {
          transform: translate3d(8vw, -2vh, 0) scale(0.9);
          opacity: 0.14;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .starfieldGlow {
          animation: none;
        }
        .star {
          animation: none;
          opacity: 0.45;
        }
      }
      .wrap {
        max-width: 860px;
        padding: 28px 18px 54px;
        margin: 0 auto;
      }
      header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .card {
        background: color-mix(in srgb, var(--card) 100%, transparent);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(14px);
        box-shadow: 0 22px 60px rgba(1, 4, 12, 0.36);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      label {
        font-size: 13px;
        color: var(--muted);
      }
      input[type="search"] {
        width: min(520px, 100%);
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.72);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 12px;
        outline: none;
        font-size: 15px;
      }
      input[type="search"]:focus {
        border-color: color-mix(in oklab, var(--text) 20%, var(--border));
        box-shadow: 0 0 0 4px var(--focus);
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
      }
      .resultsHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .resultsHeader h2 {
        margin: 0;
        font-size: 16px;
      }
      .count {
        color: var(--muted);
        font-size: 13px;
      }
      .list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0;
        margin: 0;
        list-style: none;
      }
      .firmLi {
        list-style: none;
      }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.56);
      }
      .itemLink {
        width: 100%;
        text-align: left;
        cursor: pointer;
        font: inherit;
        color: inherit;
        text-decoration: none;
      }
      .itemLink:hover {
        border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
        background: rgba(16, 24, 46, 0.88);
      }
      .itemLink:focus {
        outline: none;
      }
      .itemLink:focus-visible {
        box-shadow: 0 0 0 4px var(--focus);
      }
      .pageHeader {
        margin-bottom: 18px;
      }
      .backLink {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: color-mix(in srgb, var(--accent) 78%, var(--text));
        text-decoration: none;
        font-size: 14px;
        font-weight: 650;
        width: fit-content;
      }
      .backLink:hover {
        text-decoration: underline;
      }
      .firmTop {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .firmSummary {
        min-width: 0;
      }
      .right {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      .name {
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
      }
      .left {
        min-width: 0;
      }
      .badge {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 650;
        border: 1px solid var(--border);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .lowRisk {
        color: color-mix(in oklab, var(--low) 92%, var(--text));
        border-color: color-mix(in oklab, var(--low) 40%, var(--border));
        background: color-mix(in oklab, var(--low) 16%, transparent);
      }
      .lowRisk .dot {
        background: var(--low);
      }
      .medRisk {
        color: color-mix(in oklab, var(--med) 92%, var(--text));
        border-color: color-mix(in oklab, var(--med) 44%, var(--border));
        background: color-mix(in oklab, var(--med) 16%, transparent);
      }
      .medRisk .dot {
        background: var(--med);
      }
      .highRisk {
        color: color-mix(in oklab, var(--high) 92%, var(--text));
        border-color: color-mix(in oklab, var(--high) 44%, var(--border));
        background: color-mix(in oklab, var(--high) 16%, transparent);
      }
      .highRisk .dot {
        background: var(--high);
      }
      .vhighRisk {
        color: color-mix(in oklab, var(--vhigh) 92%, var(--text));
        border-color: color-mix(in oklab, var(--vhigh) 44%, var(--border));
        background: color-mix(in oklab, var(--vhigh) 16%, transparent);
      }
      .vhighRisk .dot {
        background: var(--vhigh);
      }
      .score {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .meter {
        position: relative;
        width: 88px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--card) 76%, transparent);
        overflow: hidden;
      }
      .meterFill {
        position: absolute;
        inset: 0;
        display: block;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--meter-start), var(--meter-end));
        clip-path: inset(0 calc(100% - var(--fill-percent, 0%)) 0 0 round 999px);
      }
      .panel {
        margin-top: 8px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.58);
      }
      .panelTitle {
        font-size: 13px;
        font-weight: 650;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .catList {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      .catRow {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(8, 13, 28, 0.52);
      }
      .catLeft {
        min-width: 0;
      }
      .catRight {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex: 0 0 auto;
      }
      .catName {
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      .catDetail {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
      }
      .empty {
        padding: 14px 12px;
        border-radius: 12px;
        border: 1px dashed var(--border);
        color: var(--muted);
        font-size: 14px;
      }
      .footerNote {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }
      mark {
        background: rgba(192, 132, 252, 0.26);
        color: inherit;
        padding: 0 0.1em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

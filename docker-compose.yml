
services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/codecamp
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy

  scrapper:
    build: ./scrapper-module
    volumes:
      - ./scrapper-module/collector:/app/collector
    environment:
      - BACKEND_URL=http://backend:8000
      - AUTO_PUSH_TO_BACKEND=1
      - IMPORT_MAX_ATTEMPTS=30
      - IMPORT_RETRY_DELAY_SECONDS=2
      - MAX_RESULTS_GOOGLE=5
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      # Dev-only credentials — do not use in production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codecamp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

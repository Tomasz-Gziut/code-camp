openapi: 3.0.3
info:
  title: Code Camp — Firm Reputation API
  version: 0.1.0
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/firms:
    get:
      operationId: listFirms
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Alias of query
      responses:
        "200":
          description: Firms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Firm"
  /api/firms/{firmId}:
    get:
      operationId: getFirmById
      parameters:
        - name: firmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Firm details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Health:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    Error:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
          example: not_found
    Category:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - score
        - detail
      properties:
        id:
          type: string
          example: identity
        name:
          type: string
          example: Identity & Registration
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 95
        detail:
          type: string
          example: Names and contact details line up.
    Firm:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - score
        - details
        - categories
      properties:
        id:
          type: string
          example: acme
        name:
          type: string
          example: Acme Corp
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 92
        details:
          type: string
          example: Looks consistent overall.
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
